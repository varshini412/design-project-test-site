<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SkillBridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Skill Gap Analyzer</h2>

        <!-- Current Role -->
        <label>Current Role</label><br>
        <input type="text" id="currentRole" placeholder="e.g. Student"><br><br>

        <!-- Current Skills -->
        <label>Your Current Skills</label><br>
        <input type="checkbox" value="HTML"> HTML<br>
        <input type="checkbox" value="CSS"> CSS<br>
        <input type="checkbox" value="JavaScript"> JavaScript<br><br>

        <!-- Target Role -->
        <label>Target Role</label><br>
        <select id="targetRole">
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Full Stack Developer</option>
        </select>
        <br><br>

        <!-- Analyze Button -->
        <button onclick="analyzeSkills()">Analyze Skill Gap</button>

        <!-- Result -->
        <div id="result" style="margin-top:20px;"></div>
    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
